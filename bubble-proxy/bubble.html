<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #07111f;
    color: #e0eeff;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 55% at 50% -5%, rgba(0,80,200,0.32) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 5% 95%,  rgba(0,50,160,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 40% 35% at 95% 85%, rgba(0,40,140,0.20) 0%, transparent 50%),
      linear-gradient(175deg, #081422 0%, #0a1830 45%, #071228 100%);
  }

  /* ── BUBBLE LAYER ── */
  #bwrap {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none; overflow: hidden;
  }

  .bub {
    position: absolute;
    bottom: -80px;
    border-radius: 50%;
    border: 1.2px solid rgba(100, 190, 255, 0.22);
    animation: rise linear infinite;
    pointer-events: none;
  }

  .bub::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.18), transparent 62%);
  }

  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    6%   { opacity: 1; }
    92%  { opacity: 0.5; }
    100% { transform: translateY(-105vh) translateX(var(--d, 0px)); opacity: 0; }
  }

  /* ── NAV ── */
  nav {
    position: relative; z-index: 20;
    display: flex; align-items: center;
    height: 54px; padding: 0 20px;
    background: rgba(6, 13, 28, 0.85);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-bottom: 1px solid rgba(0, 130, 220, 0.13);
    flex-shrink: 0;
  }

  .brand { display: flex; align-items: center; gap: 10px; }

  .brand-icon {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, rgba(0,120,255,0.3), rgba(0,60,180,0.4));
    border: 1px solid rgba(0, 150, 255, 0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }

  .brand-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 2.5px; color: #c8e4ff;
  }

  .brand-badge {
    font-size: 10px; font-weight: 400;
    color: rgba(80, 170, 255, 0.75);
    background: rgba(0, 130, 255, 0.1);
    border: 1px solid rgba(0, 150, 255, 0.2);
    border-radius: 6px; padding: 2px 7px;
    letter-spacing: 1px;
  }

  .nspc { flex: 1; }

  .mbtn {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(0, 100, 210, 0.12);
    border: 1px solid rgba(0, 140, 255, 0.18);
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4.5px;
    transition: all 0.2s;
  }
  .mbtn:hover { background: rgba(0, 130, 255, 0.2); border-color: rgba(0, 180, 255, 0.35); }

  .hl { width: 15px; height: 1.5px; background: rgba(140, 200, 255, 0.55); border-radius: 2px; }

  /* ── MAIN ── */
  main {
    position: relative; z-index: 5;
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 24px 64px;
  }

  #clock {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(56px, 8.5vw, 88px);
    font-weight: 200; letter-spacing: 1px;
    color: rgba(220, 240, 255, 0.95);
    text-shadow: 0 2px 30px rgba(0,140,255,0.22), 0 0 80px rgba(0,80,200,0.10);
    line-height: 1; margin-bottom: 8px;
    opacity: 0;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(10px, 1.2vw, 13px);
    font-weight: 700; letter-spacing: 9px;
    color: rgba(100, 170, 230, 0.55);
    text-transform: uppercase;
    margin-bottom: 38px;
    opacity: 0;
  }

  /* ── SEARCH ── */
  .swrap {
    width: 100%; max-width: 540px;
    position: relative; margin-bottom: 44px;
  }

  .swrap input {
    width: 100%;
    padding: 16px 54px 16px 26px;
    background: rgba(0, 40, 110, 0.22);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 1.5px solid rgba(0, 160, 255, 0.22);
    border-radius: 60px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 300;
    color: #d8eeff; outline: none; letter-spacing: 0.3px;
    box-shadow: 0 4px 28px rgba(0,80,200,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  }
  .swrap input::placeholder { color: rgba(100, 165, 220, 0.42); }
  .swrap input:focus {
    border-color: rgba(0, 190, 255, 0.55);
    background: rgba(0, 55, 140, 0.28);
    box-shadow: 0 4px 32px rgba(0,140,255,0.20), 0 0 0 1px rgba(0,180,255,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .sicon {
    position: absolute; right: 18px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(100, 180, 255, 0.5);
    display: flex; align-items: center; padding: 5px;
    transition: color 0.2s, transform 0.2s;
  }
  .sicon:hover { color: rgba(0, 200, 255, 0.9); transform: translateY(-50%) scale(1.12); }

  /* ── QUICK LINKS ── */
  .qlh {
    font-size: 9.5px; font-weight: 600;
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(80, 150, 210, 0.45);
    margin-bottom: 18px;
  }

  .qls { display: flex; gap: 20px; justify-content: center; }

  .ql {
    display: flex; flex-direction: column;
    align-items: center; gap: 9px;
    cursor: pointer; text-decoration: none;
  }

  .qlc {
    width: 88px; height: 84px; border-radius: 22px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(0, 150, 255, 0.14);
    box-shadow: 0 2px 14px rgba(0, 60, 160, 0.12);
    transition: all 0.28s cubic-bezier(0.34, 1.45, 0.64, 1);
    position: relative; overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .qlc::after {
    content: '';
    position: absolute; inset: 0; border-radius: 22px;
    background: radial-gradient(circle at 32% 24%, rgba(255,255,255,0.07), transparent 58%);
    pointer-events: none;
  }

  .qln { font-size: 10.5px; font-weight: 400; color: rgba(130, 185, 230, 0.6); letter-spacing: 0.3px; transition: color 0.2s; }

  .ql:hover .qlc {
    transform: translateY(-6px) scale(1.07);
    background: rgba(0, 100, 200, 0.18);
    border-color: rgba(0, 190, 255, 0.38);
    box-shadow: 0 14px 36px rgba(0,100,220,0.22), inset 0 1px 0 rgba(255,255,255,0.07);
  }
  .ql:hover .qln { color: rgba(160, 220, 255, 0.95); }

  /* ── STATUS BAR ── */
  #sbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 30px;
    background: rgba(4, 10, 24, 0.75);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(0, 110, 200, 0.12);
    display: flex; align-items: center;
    padding: 0 18px; gap: 16px;
    font-size: 10.5px; font-weight: 300;
    color: rgba(90, 155, 210, 0.55); letter-spacing: 0.4px;
  }
  .sdot { width: 5px; height: 5px; border-radius: 50%; background: #22d9a0; box-shadow: 0 0 6px #22d9a0; }
  .ss { opacity: 0.25; }

  /* ── PROXY VIEWER OVERLAY ── */
  #viewer {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    background: #07111f;
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  #viewer.open {
    transform: translateY(0);
    pointer-events: all;
  }

  #vbar {
    height: 50px; flex-shrink: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px;
    background: rgba(6, 13, 28, 0.95);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(0, 130, 220, 0.15);
  }

  .vbtn {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    background: rgba(0, 100, 210, 0.12);
    border: 1px solid rgba(0, 140, 255, 0.18);
    color: rgba(140, 200, 255, 0.7);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.18s;
  }
  .vbtn:hover { background: rgba(0, 130, 255, 0.22); color: #c8e4ff; border-color: rgba(0, 180, 255, 0.35); }

  #vurl {
    flex: 1; height: 32px; padding: 0 14px;
    background: rgba(0, 30, 80, 0.35);
    border: 1px solid rgba(0, 140, 255, 0.18);
    border-radius: 8px;
    font-family: 'Outfit', monospace; font-size: 12px; font-weight: 300;
    color: rgba(160, 210, 255, 0.8);
    outline: none; letter-spacing: 0.2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  #vload {
    height: 2px; flex-shrink: 0;
    background: rgba(0, 100, 200, 0.15);
    position: relative; overflow: hidden;
  }
  #vload-bar {
    position: absolute; left: -40%; top: 0; bottom: 0;
    width: 40%;
    background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.7), transparent);
    animation: loadSlide 1.1s ease-in-out infinite;
    opacity: 0; transition: opacity 0.2s;
  }
  #vload-bar.active { opacity: 1; }
  @keyframes loadSlide { 0% { left: -40%; } 100% { left: 100%; } }

  #verr {
    position: absolute; top: 52px; left: 0; right: 0; z-index: 5;
    padding: 10px 16px;
    background: rgba(200, 50, 50, 0.18);
    border-bottom: 1px solid rgba(255, 80, 80, 0.2);
    font-size: 12px; color: rgba(255, 160, 160, 0.9);
    text-align: center; display: none;
  }

  #vframe {
    flex: 1; border: none;
    background: #fff;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="bwrap"></div>

<nav>
  <div class="brand">
    <div class="brand-icon">🫧</div>
    <span class="brand-name">Bubble</span>
    <span class="brand-badge">v2</span>
  </div>
  <div class="nspc"></div>
  <button class="mbtn">
    <div class="hl"></div>
    <div class="hl"></div>
    <div class="hl"></div>
  </button>
</nav>

<main>
  <div id="clock">00:00:00 AM</div>
  <div class="title">Bubble</div>

  <div class="swrap">
    <input type="text" id="srch" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false">
    <button class="sicon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="qlh">Quick Links</div>
  <div class="qls">

    <a class="ql" href="#" onclick="openViewer('https://discord.com');return false;">
      <div class="qlc">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="#5865F2">
          <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        <span class="qln">Discord</span>
      </div>
    </a>

    <a class="ql" href="#" onclick="openViewer('https://youtube.com');return false;">
      <div class="qlc">
        <svg width="32" height="22" viewBox="0 0 24 17">
          <rect width="24" height="17" rx="3.5" fill="#FF0000"/>
          <polygon points="9.5,3.5 9.5,13.5 17,8.5" fill="white"/>
        </svg>
        <span class="qln">YouTube</span>
      </div>
    </a>

    <a class="ql" href="#" onclick="openViewer('https://github.com');return false;">
      <div class="qlc">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="#e0eeff">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        <span class="qln">GitHub</span>
      </div>
    </a>

  </div>
</main>

<div id="sbar">
  <div class="sdot"></div>
  <span>Connected</span>
  <span class="ss">·</span>
  <span>🌐 Pacific Node</span>
  <span class="ss">·</span>
  <span id="lat">-- ms</span>
</div>

<!-- ── PROXY VIEWER OVERLAY ── -->
<div id="viewer">
  <div id="vbar">
    <button class="vbtn" id="vback" title="Back to home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="vbtn" id="vreload" title="Reload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <div id="vurl"></div>
    <button class="vbtn" id="vopen" title="Open in new tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </button>
  </div>
  <div id="vload"><div id="vload-bar"></div></div>
  <div id="verr"></div>
  <iframe id="vframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
  // ================================================================
  //  PROXY CONFIG — set this to your deployed Worker URL
  //  Example: "https://bubble-proxy.yourname.workers.dev"
  // ================================================================
  const PROXY_BASE = "https://bubble-proxy.YOUR_SUBDOMAIN.workers.dev";

  // ── BUBBLES ──
  const bwrap = document.getElementById('bwrap');
  for (let i = 0; i < 38; i++) {
    const b = document.createElement('div');
    b.className = 'bub';
    const r     = 4 + Math.random() * 22;
    const drift = (Math.random() - 0.5) * 140;
    const dur   = 7 + Math.random() * 12;
    const delay = -(Math.random() * dur);
    const left  = Math.random() * 100;
    const alpha = 0.06 + Math.random() * 0.18;
    const hue   = 195 + Math.random() * 30;
    b.style.cssText = `
      width:${r*2}px; height:${r*2}px;
      left:${left}%;
      --d:${drift}px;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
      border-color:hsla(${hue},75%,72%,${alpha*1.5});
      opacity:${alpha};
    `;
    bwrap.appendChild(b);
  }

  // ── CLOCK ──
  function tick() {
    const n = new Date();
    let h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
  }
  tick();
  setInterval(tick, 1000);

  // ── LATENCY SIMULATION ──
  function updateLat() {
    document.getElementById('lat').textContent = (14 + Math.floor(Math.random() * 38)) + ' ms';
  }
  updateLat();
  setInterval(updateLat, 3500);

  // ── PROXY VIEWER ─────────────────────────────────────────────
  const viewer   = document.getElementById('viewer');
  const vframe   = document.getElementById('vframe');
  const vurl     = document.getElementById('vurl');
  const vloadBar = document.getElementById('vload-bar');
  const verr     = document.getElementById('verr');
  let   currentRawUrl = '';

  function proxyUrl(target) {
    return `${PROXY_BASE}/proxy?url=${encodeURIComponent(target)}`;
  }

  function openViewer(rawUrl) {
    currentRawUrl = rawUrl;
    verr.style.display = 'none';
    vurl.textContent   = rawUrl;
    vloadBar.classList.add('active');
    vframe.src = proxyUrl(rawUrl);
    viewer.classList.add('open');
  }

  function closeViewer() {
    viewer.classList.remove('open');
    setTimeout(() => {
      vframe.src = 'about:blank';
      vloadBar.classList.remove('active');
      verr.style.display = 'none';
    }, 400);
  }

  vframe.addEventListener('load',  () => vloadBar.classList.remove('active'));
  vframe.addEventListener('error', () => {
    vloadBar.classList.remove('active');
    verr.textContent   = 'Could not load page — the site may block embedding.';
    verr.style.display = 'block';
  });

  document.getElementById('vback').addEventListener('click',   closeViewer);
  document.getElementById('vreload').addEventListener('click', () => {
    vloadBar.classList.add('active');
    vframe.src = proxyUrl(currentRawUrl);
  });
  document.getElementById('vopen').addEventListener('click', () => {
    window.open(currentRawUrl, '_blank');
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

  // ── SEARCH ───────────────────────────────────────────────────
  function doSearch() {
    const inp = document.getElementById('srch');
    const val = inp.value.trim();
    if (!val) return;

    const isUrl = /^https?:\/\/|^[\w-]+\.\w{2,}/.test(val);
    const target = isUrl
      ? (val.startsWith('http') ? val : 'https://' + val)
      : 'https://www.google.com/search?q=' + encodeURIComponent(val);

    openViewer(target);
    inp.value = '';
  }

  document.getElementById('srch').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  document.querySelector('.sicon').addEventListener('click', doSearch);

  // ── ENTRANCE ANIMATIONS ──
  anime({ targets: 'nav', translateY: [-10, 0], opacity: [0, 1], duration: 500, easing: 'easeOutCubic' });
  anime({ targets: '#clock', translateY: [28, 0], opacity: [0, 1], duration: 800, delay: 120, easing: 'easeOutCubic' });
  anime({ targets: '.title', scale: [0.7, 1.12, 1], opacity: [0, 1], duration: 1300, delay: 280, easing: 'easeOutElastic(1, 0.62)' });
  anime({ targets: '.title', textShadow: ['0 0 0px rgba(0,140,255,0)', '0 0 24px rgba(0,160,255,0.55)', '0 0 10px rgba(0,140,255,0.25)'], duration: 1300, delay: 280, easing: 'easeOutQuad' });
  anime({ targets: '.swrap', translateY: [16, 0], opacity: [0, 1], duration: 650, delay: 420, easing: 'easeOutCubic' });
